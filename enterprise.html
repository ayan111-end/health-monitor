<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>毫米波雷达远程健康监测平台</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}
body {
  background: #0a1428;
  color: #fff;
  min-height: 100vh;
  padding: 12px;
}

@keyframes glowText {
  0% { text-shadow: 0 0 4px #00d4ff; }
  50% { text-shadow: 0 0 12px #00d4ff; }
  100% { text-shadow: 0 0 4px #00d4ff; }
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

.card {
  border: 2px solid #00d4ff;
  box-shadow: 0 0 10px #00d4ff, 0 0 20px rgba(0,212,255,0.3);
  background: rgba(18,29,55,0.92);
  border-radius: 8px;
  padding: 12px;
  transition: 0.2s;
}
.card:hover{
  box-shadow: 0 0 20px #00d4ff;
}
.card-title {
  color: #00d4ff;
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 10px;
  animation: glowText 2s infinite alternate;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.header .title {
  color: #00d4ff;
  font-size: 20px;
  font-weight: bold;
  animation: glowText 2s infinite alternate;
}
.header .user-info {
  color: #8ab4f8;
  font-size: 14px;
}
.logout {
  color: #ff4c4c;
  cursor: pointer;
  font-weight: bold;
  margin-left: 10px;
  transition: 0.2s;
}
.logout:hover{
  text-shadow: 0 0 5px #ff4c4c;
}

.search-box {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.search-box input {
  flex: 1;
  height: 36px;
  padding: 0 12px;
  background: #0f1a30;
  border: 1px solid #2a4a7a;
  border-radius: 6px;
  color: #fff;
  outline: none;
  transition: 0.2s;
}
.search-box input:focus{
  border-color: #00d4ff;
}
.search-box button {
  padding: 0 16px;
  height: 36px;
  background: #0099ff;
  border: none;
  border-radius: 6px;
  color: #fff;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}
.search-box button:hover{
  opacity: 0.9;
}
.search-box button:disabled{
  opacity: 0.6;
  cursor: not-allowed;
}

.layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  gap: 12px;
}

.left-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.user-card {
  display: none;
}
.user-card.show {
  display: block;
}
.user-card .item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  color: #8ab4f8;
  font-size: 14px;
}
.go-btn {
  background: #00d4ff;
  color: #000;
  border: none;
  padding: 8px;
  border-radius: 6px;
  width: 100%;
  cursor: pointer;
  font-weight: bold;
  margin-top: 8px;
  transition: 0.2s;
}
.go-btn:hover{
  opacity: 0.9;
}

.left-panel .card:last-child {
  height: 670px !important; 
  flex-direction: column;
  display: flex;
}

.um-table-wrapper {
  flex: 1;
  overflow-y: auto !important; 
  overflow-x: hidden;
  padding-right: 4px;
  margin-top: 4px;
}

.um-table-wrapper::-webkit-scrollbar {
  width: 6px;
}
.um-table-wrapper::-webkit-scrollbar-thumb {
  background: #00d4ff;
  border-radius: 3px;
}
.um-table-wrapper::-webkit-scrollbar-track {
  background: #101b33;
}

.um-table {
  width: 100%;
  border-collapse: collapse;
  color: #fff;
  font-size: 13px;
  table-layout: fixed;
}
.um-table th, .um-table td {
  padding: 8px;
  text-align: center;
  border: 1px solid #2a4a7a;
  white-space: nowrap;
}
.um-table th {
  background: #121d37;
  color: #00d4ff;
  position: sticky;
  top: 0;
  z-index: 10;
}
.um-table tr:hover{
  background: rgba(0,212,255,0.1);
}
.um-edit {
  color: #00d4ff;
  cursor: pointer;
  margin-right: 6px;
}
.um-del {
  color: #ff4c4c;
  cursor: pointer;
}
.empty-tip{
  text-align: center;
  padding: 20px 0;
  color: #8ab4f8;
}

.right-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.kpi {
  text-align: center;
}
.kpi .num {
  font-size: 24px;
  color: #00d4ff;
  font-weight: bold;
  margin-bottom: 4px;
  transition: 0.3s;
}
.kpi .lab {
  font-size: 13px;
  color: #8ab4f8;
}

.chart-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.chart {
  width: 100%;
  height: 220px;
}

#loading {
  position: fixed;
  inset: 0;
  background: #0a1428;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #00d4ff;
  font-size: 22px;
  flex-direction: column;
  gap: 16px;
}
.loader-circle {
  width: 50px;
  height: 50px;
  border: 4px solid rgba(0,212,255,0.3);
  border-top-color: #00d4ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
</style>
</head>

<body>
<div id="loading">
  <div class="loader-circle"></div>
  <div>加载中...</div>
</div>

<div class="header">
  <div class="title">🏥 企业健康监测总控平台</div>
  <div class="user-info">企业管理员 <span class="logout" onclick="logout()">退出登录</span></div>
</div>

<div class="search-box">
  <input id="searchUser" placeholder="输入用户名搜索：张三 / 李四 / 王五">
  <button onclick="searchUser()">搜索用户</button>
</div>

<div class="layout">
  <div class="left-panel">
    <div class="card user-card" id="userCard">
      <div class="card-title">用户信息</div>
      <div class="item"><span>用户名</span><span id="s_name"></span></div>
      <div class="item"><span>账号类型</span><span id="s_type"></span></div>
      <div class="item"><span>健康状态</span><span id="s_status"></span></div>
      <button class="go-btn" onclick="goPersonal()">进入该用户健康中心</button>
    </div>

    <div class="card">
      <div class="card-title">👥 用户管理模块</div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
        <input id="newUserName" placeholder="用户名" style="flex:1;height:32px;padding:0 8px;background:#0f1a30;border:1px solid #2a4a7a;border-radius:4px;color:#fff;outline:none;">
        <input id="newUserGender" placeholder="性别" style="width:70px;height:32px;padding:0 8px;background:#0f1a30;border:1px solid #2a4a7a;border-radius:4px;color:#fff;outline:none;">
        <input id="newUserAge" placeholder="年龄" style="width:70px;height:32px;padding:0 8px;background:#0f1a30;border:1px solid #2a4a7a;border-radius:4px;color:#fff;outline:none;">
        <input id="newUserHeight" placeholder="身高" style="width:80px;height:32px;padding:0 8px;background:#0f1a30;border:1px solid #2a4a7a;border-radius:4px;color:#fff;outline:none;">
        <input id="newUserWeight" placeholder="体重" style="width:80px;height:32px;padding:0 8px;background:#0f1a30;border:1px solid #2a4a7a;border-radius:4px;color:#fff;outline:none;">
        <button id="addBtn" onclick="addUser()" style="padding:0 12px;height:32px;background:#00d4ff;border:none;border-radius:4px;color:#000;font-weight:bold;cursor:pointer;">添加</button>
      </div>
      
      <div class="um-table-wrapper">
        <table class="um-table">
          <thead>
            <tr>
              <th>用户名</th>
              <th>性别</th>
              <th>年龄</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="userList"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="kpis">
      <div class="card kpi"><div class="num" id="u1">0</div><div class="lab">监测用户</div></div>
      <div class="card kpi"><div class="num" id="u2">0</div><div class="lab">今日在线</div></div>
      <div class="card kpi"><div class="num" id="u3">0%</div><div class="lab">识别准确率</div></div>
      <div class="card kpi"><div class="num" id="u4">0</div><div class="lab">健康预警</div></div>
    </div>

    <div class="chart-grid">
      <div class="card">
        <div class="card-title">24小时监测趋势</div>
        <div id="chart2" class="chart"></div>
      </div>
      <div class="card">
        <div class="card-title">健康等级分布</div>
        <div id="chart3" class="chart"></div>
      </div>
      <div class="card">
        <div class="card-title">异常类型统计</div>
        <div id="chart5" class="chart"></div>
      </div>
      <div class="card">
        <div class="card-title">用户在线时段统计</div>
        <div id="chart4" class="chart"></div>
      </div>
    </div>
  </div>
</div>

<script>
let currentUser = '';
let loading = false;
let c2,c3,c4,c5;

// 获取真实总用户数（核心！图表全靠这个数动态变化）
function getTotalUser(){
  const db = JSON.parse(localStorage.getItem('userDB') || '{}');
  let count = 0;
  for(let k in db){
    if(k !== 'company') count++;
  }
  return count;
}

function removeLoading(){
  const l = document.getElementById('loading');
  if(l) l.style.display='none';
}

function resetUserDB() {
  localStorage.setItem('userDB', JSON.stringify({
    "张三": { type: "personal", gender:"男", age:30, height:175, weight:70, heart: 68, breath: 16, hrv: 38, level: "良好" },
    "李四": { type: "personal", gender:"女", age:28, height:165, weight:55, heart: 76, breath: 20, hrv: 32, level: "一般" },
    "王五": { type: "personal", gender:"男", age:35, height:180, weight:80, heart: 78, breath: 18, hrv: 35, level: "良好" },
    "company": { type: "enterprise" }
  }));
}

const API = {
  async getUserList(){
    await new Promise(resolve => setTimeout(resolve, 300));
    return JSON.parse(localStorage.getItem('userDB') || '{}');
  },
  async addUser(data){
    await new Promise(resolve => setTimeout(resolve, 500));
    const db = JSON.parse(localStorage.getItem('userDB'));
    db[data.name] = data.info;
    localStorage.setItem('userDB', JSON.stringify(db));
    updateAllChart(); // 添加用户后刷新图表
    return { code:200, msg:'添加成功' };
  },
  async delUser(name){
    await new Promise(resolve => setTimeout(resolve, 500));
    const db = JSON.parse(localStorage.getItem('userDB'));
    delete db[name];
    localStorage.setItem('userDB', JSON.stringify(db));
    updateAllChart(); // 删除用户后刷新图表
    return { code:200, msg:'删除成功' };
  },
  async updateUser(name, info){
    await new Promise(resolve => setTimeout(resolve, 500));
    const db = JSON.parse(localStorage.getItem('userDB'));
    db[name] = { ...db[name], ...info };
    localStorage.setItem('userDB', JSON.stringify(db));
    return { code:200, msg:'更新成功' };
  }
}

async function updateKPI(){
  const db = await API.getUserList();
  let total = 0, online = 0, warn = 0;
  for(let k in db){
    if(k === 'company') continue;
    total++;
    online += Math.random() > 0.3 ? 1 : 0;
    if(db[k].heart > 80 || db[k].breath > 20) warn++;
  }
  document.getElementById('u1').innerText = total;
  document.getElementById('u2').innerText = online;
  document.getElementById('u3').innerText = (97 + Math.random()*3).toFixed(1)+'%';
  document.getElementById('u4').innerText = warn;
}

async function updateVitalSigns(){
  const db = await API.getUserList();
  for(let k in db){
    if(k === 'company') continue;
    db[k].heart = Math.max(60, Math.min(100, db[k].heart + (Math.random()*4 - 2)));
    db[k].breath = Math.max(12, Math.min(24, db[k].breath + (Math.random()*2 - 1)));
  }
  localStorage.setItem('userDB', JSON.stringify(db));
  updateKPI();
}

async function renderUserList(){
  const db = await API.getUserList();
  const list = document.getElementById('userList');
  list.innerHTML = '';
  let hasUser = false;
  for(let name in db){
    if(name === 'company') continue;
    hasUser = true;
    const u = db[name];
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${name}</td>
      <td>${u.gender||'-'}</td>
      <td>${u.age||'-'}</td>
      <td>
        <span class="um-edit" onclick="editUser('${name}')">编辑</span>
        <span class="um-del" onclick="delUser('${name}')">删除</span>
      </td>
    `;
    list.appendChild(tr);
  }
  if(!hasUser){
    list.innerHTML = '<tr><td colspan="4" class="empty-tip">暂无用户数据</td></tr>';
  }
  updateAllChart(); // 渲染列表后刷新图表
}

// ========== 核心：图表数据 跟随 真实用户总数 动态变化 ==========
function updateAllChart(){
  const total = getTotalUser(); // 获取当前真实用户数

  // 1. 24小时监测趋势：数值 = 0 ~ 总用户数
  const lineData = Array.from({length:6},()=> Math.floor(Math.random() * total) || 0);
  c2.setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis'},
    xAxis:{type:'category',data:['0时','4时','8时','12时','16时','20时'],axisLine:{lineStyle:{color:'#2a4a7a'}},axisLabel:{color:'#8ab4f8'}},
    yAxis:{type:'value',name:'监测人数',min:0,max:total || 5,axisLine:{lineStyle:{color:'#2a4a7a'}},axisLabel:{color:'#8ab4f8'}},
    series:[{type:'line',smooth:true,data:lineData,itemStyle:{color:'#00d4ff'},areaStyle:{color:'rgba(0,212,255,0.2)'}}]
  });

  // 2. 健康等级分布
  let h = Math.floor(Math.random()*30 + 50);
  let m = Math.floor(Math.random()*20 + 15);
  let e = Math.floor(Math.random()*10 + 5);
  c3.setOption({
    backgroundColor:'transparent',tooltip:{trigger:'item'},
    series:[{type:'pie',radius:['30%','60%'],data:[
      {value:h,name:'健康',itemStyle:{color:'#00d4ff'}},
      {value:m,name:'一般',itemStyle:{color:'#facc15'}},
      {value:e,name:'异常',itemStyle:{color:'#ff4c4c'}}
    ],label:{color:'#fff'}}]
  });

  // 3. 用户在线时段统计：数值 = 0 ~ 总用户数
  const barData = Array.from({length:4},()=> Math.floor(Math.random() * total) || 0);
  c4.setOption({
    backgroundColor:'transparent',tooltip:{trigger:'axis'},
    xAxis:{type:'category',data:['凌晨','上午','下午','晚上'],axisLine:{lineStyle:{color:'#2a4a7a'}},axisLabel:{color:'#8ab4f8'}},
    yAxis:{type:'value',name:'在线人数',min:0,max:total || 5,axisLine:{lineStyle:{color:'#2a4a7a'}},axisLabel:{color:'#8ab4f8'}},
    series:[{type:'bar',data:barData,itemStyle:{color:'#0099ff'}}]
  });

  // 4. 异常类型统计
  let r1 = Math.floor(Math.random()*40 + 70);
  let r2 = Math.floor(Math.random()*30 + 50);
  let r3 = Math.floor(Math.random()*20 + 30);
  c5.setOption({
    backgroundColor: 'transparent',tooltip: { trigger: 'item' },
    series: [{
      type: 'pie',radius: ['40%', '70%'],
      data: [
        { value: r1, name: '心率异常', itemStyle: { color: '#ff4c4c' } },
        { value: r2, name: '呼吸异常', itemStyle: { color: '#ff9800' } },
        { value: r3, name: '睡眠异常', itemStyle: { color: '#8c9eff' } }
      ],label: { color: '#fff' }
    }]
  });
}

function logout(){
  if(confirm('确定退出？'))location.href='index.html';
}

function searchUser(){
  const inputVal = document.getElementById('searchUser').value.trim();
  const card = document.getElementById('userCard');
  if(!inputVal){
    alert('请输入用户名');
    card.classList.remove('show');
    currentUser = '';
    return;
  }
  const userDB = JSON.parse(localStorage.getItem('userDB')) || {};
  if(userDB[inputVal]){
    currentUser = inputVal;
    document.getElementById('s_name').innerText = inputVal;
    document.getElementById('s_type').innerText = userDB[inputVal].type === 'personal' ? '个人账号' : '企业账号';
    let status = '正常';
    if(userDB[inputVal].heart > 80) status = '心率偏高';
    if(userDB[inputVal].breath > 21) status = '呼吸偏快';
    document.getElementById('s_status').innerText = status;
    card.classList.add('show');
  }else{
    alert('未找到用户：'+inputVal+'\n测试账号：张三、李四、王五');
    card.classList.remove('show');
    currentUser = '';
  }
}

function goPersonal(){
  if(!currentUser){
    alert('请先搜索并选中一个用户！');
    return;
  }
  localStorage.setItem('currentViewUser', currentUser);
  localStorage.setItem('fromEnterprise', 'true');
  window.location.href = 'personal.html';
}

document.getElementById('searchUser').addEventListener('keydown',e=>{if(e.key=='Enter')searchUser();});

async function addUser(){
  if(loading) return;
  const btn = document.getElementById('addBtn');
  const name = document.getElementById('newUserName').value.trim();
  let gender = document.getElementById('newUserGender').value.trim();
  const age = document.getElementById('newUserAge').value.trim();
  const height = document.getElementById('newUserHeight').value.trim();
  const weight = document.getElementById('newUserWeight').value.trim();
  const userDB = JSON.parse(localStorage.getItem('userDB')) || {};

  if(!name){ alert('请输入用户名！'); return; }
  if(userDB[name]){ alert('用户名已存在！'); return; }
  gender = gender === '男' || gender === '女' ? gender : '';
  if(!gender){ alert('性别只能填男/女！'); return; }
  if(!/^\d+$/.test(age) || age < 1 || age > 120){ alert('年龄不合法！'); return; }
  if(!/^\d+$/.test(height) || height < 50 || height > 250){ alert('身高不合法！'); return; }
  if(!/^\d+$/.test(weight) || weight < 1 || weight > 300){ alert('体重不合法！'); return; }

  loading = true;
  btn.innerText = '添加中...';
  btn.disabled = true;

  const res = await API.addUser({
    name, info:{
      type: 'personal', gender, age, height, weight,
      heart: 70, breath: 18, hrv: 35, level: "良好"
    }
  });

  alert(res.msg);
  loading = false;
  btn.innerText = '添加';
  btn.disabled = false;
  document.getElementById('newUserName').value='';
  document.getElementById('newUserGender').value='';
  document.getElementById('newUserAge').value='';
  document.getElementById('newUserHeight').value='';
  document.getElementById('newUserWeight').value='';
  
  await renderUserList();
  updateKPI();
}

async function delUser(name){
  if(loading) return;
  if(!confirm('确定删除用户：'+name+'？')) return;
  
  loading = true;
  const res = await API.delUser(name);
  alert(res.msg);
  loading = false;
  
  await renderUserList();
  updateKPI();
}

async function editUser(name){
  if(loading) return;
  const userDB = JSON.parse(localStorage.getItem('userDB'));
  const u = userDB[name];

  const gender = prompt('修改性别', u.gender);
  const age = prompt('修改年龄', u.age);
  const height = prompt('修改身高(cm)', u.height);
  const weight = prompt('修改体重(kg)', u.weight);

  if(!gender || !age || !height || !weight) return;
  if(gender !== '男' && gender !== '女'){ alert('性别只能填男/女！'); return; }
  if(!/^\d+$/.test(age) || age < 1 || age > 120){ alert('年龄不合法！'); return; }

  loading = true;
  const res = await API.updateUser(name, { gender, age, height, weight });
  alert(res.msg);
  loading = false;
  
  renderUserList();
}

// 初始化
window.onload = async function(){
  if(!localStorage.getItem('userDB')) resetUserDB();

  c2 = echarts.init(document.getElementById('chart2'));
  c3 = echarts.init(document.getElementById('chart3'));
  c4 = echarts.init(document.getElementById('chart4'));
  c5 = echarts.init(document.getElementById('chart5'));

  updateAllChart();
  setInterval(updateAllChart, 3000);

  window.addEventListener('resize',()=>{
    c2.resize();c3.resize();c4.resize();c5.resize();
  });

  await renderUserList();
  updateKPI();
  removeLoading();

  setInterval(updateVitalSigns, 3000);
};
</script>
</body>
</html>
