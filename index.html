<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康监测登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family: "Microsoft YaHei",sans-serif;}
body{
  background:url('bj.jpg') center center / cover no-repeat fixed #0a1428;
  min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;
}
body::after{
  content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.6);z-index:0;
}
.login-box{
  position:relative;z-index:1;background:rgba(18,29,55,.9);
  border:1px solid #00d4ff;border-radius:16px;
  width:100%;max-width:440px;padding:40px 30px;
  backdrop-filter:blur(8px);
}
.title{text-align:center;font-size:24px;color:#00d4ff;margin-bottom:30px;animation:glowText 2s infinite alternate;}
.tab{display:flex;margin-bottom:20px;border-bottom:1px solid #2a4a7a;}
.tab-item{flex:1;text-align:center;padding:10px 0;color:#8ab4f8;cursor:pointer;}
.tab-item.active{color:#00d4ff;border-bottom:2px solid #00d4ff;}
.form-item{margin-bottom:18px;}
label{display:block;color:#8ab4f8;font-size:14px;margin-bottom:6px;}
input{width:100%;height:44px;background:rgba(15,26,48,.8);border:1px solid #2a4a7a;border-radius:8px;padding:0 14px;color:#fff;outline:none;}
.btn{width:100%;height:46px;background:linear-gradient(90deg,#00d4ff,#0099ff);border:none;border-radius:8px;color:#fff;font-size:16px;font-weight:bold;margin-top:10px;cursor:pointer;}
.link-group{display:flex;justify-content:space-between;margin-top:16px;}
.link{color:#8ab4f8;font-size:14px;cursor:pointer;}
.panel{display:none;}
.panel.active{display:block;}

/* 统一弹窗样式 */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:999;display:none;align-items:center;justify-content:center;}
.modal-box{background:#121d37;border:2px solid #00d4ff;border-radius:16px;width:100%;max-width:440px;padding:30px;position:relative;}
.modal-close{position:absolute;right:20px;top:15px;color:#00d4ff;cursor:pointer;font-size:20px;}
.slogan{text-align:center;color:#8ab4f8;font-size:13px;margin-top:20px;opacity:0.8;}

@keyframes glowText {
  0%{text-shadow:0 0 4px #00d4ff}
  50%{text-shadow:0 0 12px #00d4ff}
  100%{text-shadow:0 0 4px #00d4ff}
}
</style>
</head>
<body>

<div class="login-box">
  <div class="title">健康监测平台</div>
  <div class="tab">
    <div class="tab-item active" onclick="switchTab('personal')">个人登录</div>
    <div class="tab-item" onclick="switchTab('enterprise')">企业登录</div>
  </div>
  <div id="personal" class="panel active">
    <div class="form-item"><label>个人账号</label><input id="p_user" placeholder="用户名"></div>
    <div class="form-item"><label>密码</label><input type="password" id="p_pwd" placeholder="密码"></div>
    <button class="btn" onclick="login('personal')">登录</button>
  </div>
  <div id="enterprise" class="panel">
    <div class="form-item"><label>企业账号</label><input id="e_user" placeholder="企业账号"></div>
    <div class="form-item"><label>企业密钥</label><input type="password" id="e_pwd" placeholder="密钥"></div>
    <button class="btn" onclick="login('enterprise')">登录</button>
  </div>
  <div class="link-group">
    <span class="link" onclick="showRegister()">注册账号</span>
    <!-- 修改为重置密码弹窗 -->
    <span class="link" onclick="showResetPwd()">忘记密码</span>
  </div>

  <div class="slogan">毫米波雷达，守护您的健康每一刻</div>
</div>

<!-- 注册弹窗 -->
<div class="modal-mask" id="registerMask">
  <div class="modal-box">
    <div class="modal-close" onclick="closeRegister()">×</div>
    <div class="title">账号注册</div>
    <div class="register-tab">
      <div class="register-tab-item active" onclick="switchRegTab('regPersonal')">个人注册</div>
      <div class="register-tab-item" onclick="switchRegTab('regEnterprise')">企业注册</div>
    </div>

    <div id="regPersonal" class="panel active">
      <div class="form-item"><label>个人账号</label><input id="reg_p_user" placeholder="请输入用户名"></div>
      <div class="form-item"><label>密码</label><input type="password" id="reg_p_pwd" placeholder="请输入密码"></div>
      <button class="btn" onclick="doRegister('personal')">立即注册</button>
    </div>

    <div id="regEnterprise" class="panel">
      <div class="form-item"><label>企业账号</label><input id="reg_e_user" placeholder="请输入企业账号"></div>
      <div class="form-item"><label>企业密钥</label><input type="password" id="reg_e_pwd" placeholder="请输入密钥"></div>
      <button class="btn" onclick="doRegister('enterprise')">立即注册</button>
    </div>
  </div>
</div>

<!-- 新增：忘记密码重置弹窗 -->
<div class="modal-mask" id="resetMask">
  <div class="modal-box">
    <div class="modal-close" onclick="closeResetPwd()">×</div>
    <div class="title">重置密码</div>
    <div class="form-item"><label>账号</label><input id="reset_user" placeholder="请输入您的账号"></div>
    <div class="form-item"><label>新密码</label><input type="password" id="reset_pwd1" placeholder="请输入新密码"></div>
    <div class="form-item"><label>确认密码</label><input type="password" id="reset_pwd2" placeholder="请再次输入新密码"></div>
    <button class="btn" onclick="doResetPwd()">确认重置</button>
  </div>
</div>

<script>
// 初始化用户库
function initUserDB(){
  const defaultUsers = {
    admin:   { pwd: "123456", type: "personal", height:"170", weight:"65", age:"25", gender:"男" },
    user1:   { pwd: "123456", type: "personal", height:"170", weight:"65", age:"25", gender:"男" },
    张三:    { pwd: "123456", type: "personal", height:"172", weight:"66", age:"26", gender:"男" },
    李四:    { pwd: "123456", type: "personal", height:"172", weight:"66", age:"26", gender:"男" },
    王五:    { pwd: "123456", type: "personal", height:"172", weight:"66", age:"26", gender:"男" },
    company: { pwd: "123456", type: "enterprise" }
  };
  localStorage.setItem('userDB', JSON.stringify(defaultUsers));
}

if(!localStorage.getItem('userDB')){
  initUserDB();
}

function getUserDB(){
  return JSON.parse(localStorage.getItem('userDB'));
}
function saveUserDB(db){
  localStorage.setItem('userDB', JSON.stringify(db));
}

// 切换登录面板
function switchTab(t){
  document.querySelectorAll('.tab-item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(t).classList.add('active');
}

// 登录逻辑
function login(type){
  let user, pwd;
  if(type === 'personal'){
    user = document.getElementById('p_user').value.trim();
    pwd = document.getElementById('p_pwd').value.trim();
  } else {
    user = document.getElementById('e_user').value.trim();
    pwd = document.getElementById('e_pwd').value.trim();
  }

  if(!user || !pwd){
    alert('请输入账号和密码！');
    return;
  }

  const userDB = getUserDB();
  if (!userDB[user]) {
    alert('账号不存在，请先注册！');
    return;
  }
  if (userDB[user].pwd !== pwd) {
    alert('密码错误！');
    return;
  }

  localStorage.setItem('currentUser', user);
  if (userDB[user].type === 'enterprise') {
    localStorage.setItem('fromEnterprise', 'true');
    location.href = 'enterprise.html'; 
  } else {
    localStorage.setItem('fromEnterprise', 'false');
    location.href = 'personal.html';
  }
}

// 注册相关
function showRegister(){
  document.getElementById('registerMask').style.display = 'flex';
}
function closeRegister(){
  document.getElementById('registerMask').style.display = 'none';
}
function switchRegTab(t){
  document.querySelectorAll('.register-tab-item').forEach(i=>i.classList.remove('active'));
  document.querySelectorAll('#regPersonal, #regEnterprise').forEach(p=>p.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(t).classList.add('active');
}
function doRegister(type){
  let user, pwd;
  if(type === 'personal'){
    user = document.getElementById('reg_p_user').value.trim();
    pwd = document.getElementById('reg_p_pwd').value.trim();
  } else {
    user = document.getElementById('reg_e_user').value.trim();
    pwd = document.getElementById('reg_e_pwd').value.trim();
  }

  if(!user || !pwd){
    alert('请填写完整信息！');
    return;
  }

  const userDB = getUserDB();
  if(userDB[user]){
    alert('该账号已存在！');
    return;
  }

  userDB[user] = { 
    pwd: pwd, 
    type: type,
    height: "", weight: "", age: "", gender: ""
  };

  saveUserDB(userDB);
  alert('注册成功！请登录');
  closeRegister();
}

// ======================
// 新增：忘记密码功能
// ======================
function showResetPwd(){
  document.getElementById('resetMask').style.display = 'flex';
}
function closeResetPwd(){
  document.getElementById('resetMask').style.display = 'none';
  // 清空输入框
  document.getElementById('reset_user').value = '';
  document.getElementById('reset_pwd1').value = '';
  document.getElementById('reset_pwd2').value = '';
}

// 执行密码重置
function doResetPwd(){
  const username = document.getElementById('reset_user').value.trim();
  const pwd1 = document.getElementById('reset_pwd1').value.trim();
  const pwd2 = document.getElementById('reset_pwd2').value.trim();

  // 校验
  if(!username || !pwd1 || !pwd2){
    alert('请填写完整信息！');
    return;
  }
  if(pwd1 !== pwd2){
    alert('两次输入的密码不一致！');
    return;
  }

  const userDB = getUserDB();
  if(!userDB[username]){
    alert('该账号不存在！');
    return;
  }

  // 更新密码
  userDB[username].pwd = pwd1;
  saveUserDB(userDB);
  
  alert('密码重置成功！请登录');
  closeResetPwd();
}

// 回车登录
document.addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const activePanel = document.querySelector('.panel.active').id;
    login(activePanel === 'personal' ? 'personal' : 'enterprise');
  }
});
</script>
</body>
</html>
